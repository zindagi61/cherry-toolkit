<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHERRY HACKER TOOLKIT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace, 'Segoe UI', Arial;
        }

        body {
            background-color: #020617; /* Deep Charcoal Black */
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
            background-image: radial-gradient(circle at center, #0b1e3a 0%, #020617 100%);
        }

        /* HARD & SECURE LOCK SCREEN */
        #pinLockScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #020617;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle at center, #081a36 0%, #010409 100%);
        }

        .lock-container {
            width: 100%;
            max-width: 380px;
            background: #0b1329;
            border: 2px solid #38bdf8; /* Hard Sky Blue */
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.4);
            padding: 30px;
            border-radius: 8px;
            text-align: center;
            animation: bootUp 0.6s ease-out;
        }

        .lock-container h2 {
            color: #38bdf8;
            font-size: 22px;
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(56, 189, 248, 0.6);
        }

        .lock-subtitle {
            color: #64748b;
            font-size: 12px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .pin-input {
            width: 100%;
            padding: 15px;
            background: #020617;
            border: 1px solid #38bdf8;
            color: #38bdf8;
            font-size: 24px;
            text-align: center;
            letter-spacing: 10px;
            border-radius: 4px;
            outline: none;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* MAIN DASHBOARD CONTAINER */
        .container {
            width: 100%;
            max-width: 1000px;
            background: #070f21; /* Hard Cyber Black Background */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 35px rgba(56, 189, 248, 0.15);
            border: 1px solid #1e293b;
            position: relative;
            z-index: 10;
            animation: fadeInContainer 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        h1.main-title {
            margin-bottom: 10px;
            color: #38bdf8; /* Hard Sky Blue Neon */
            font-size: 28px;
            text-align: center;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.6);
        }

        /* OWNER DETAILS SECTION */
        .owner-details-box {
            background: #0b1528;
            border: 1px solid #38bdf8;
            padding: 18px;
            border-radius: 8px;
            margin-bottom: 25px;
            box-shadow: inset 0 0 10px rgba(56, 189, 248, 0.1);
        }

        .owner-title {
            color: #38bdf8;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .owner-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        .owner-item {
            font-size: 13px;
            color: #94a3b8;
            background: #020617;
            padding: 10px;
            border-radius: 4px;
            border-left: 3px solid #f472b6; /* Pink border touch */
        }

        .owner-item span {
            color: #f8fafc;
            font-weight: bold;
        }

        /* INPUTS & ACCENTS */
        .input-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 13px;
            color: #38bdf8;
        }

        input.admin-input {
            width: 100%;
            padding: 12px 14px;
            background: #020617;
            border: 1px solid #1e293b;
            border-radius: 6px;
            font-size: 14px;
            color: white;
            outline: none;
            transition: all 0.3s;
        }

        input.admin-input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.3);
        }

        .btn {
            width: 100%;
            background: #0284c7;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #0ea5e9;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .hidden {
            display: none !important;
        }

        /* DASHBOARD LAYOUT */
        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #1e293b;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .admin-btn {
            background: #0f172a;
            padding: 8px 14px;
            font-size: 13px;
            width: auto;
            border: 1px solid #38bdf8;
            color: #38bdf8;
        }

        .admin-btn:hover {
            background: #38bdf8;
            color: #020617;
        }

        .section-title {
            margin: 20px 0 15px 0;
            font-size: 16px;
            color: #38bdf8;
            border-left: 4px solid #38bdf8;
            padding-left: 8px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* SOFT WHITE TOOLS CARDS WITH GLOWING PINK BORDER */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95); /* Soft White Feel Box */
            border: 2px solid #f472b6; /* Soft Neon Pink */
            box-shadow: 0 0 12px rgba(244, 114, 182, 0.3); /* Pink Glowing Effect */
            padding: 22px;
            border-radius: 12px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            animation: scaleInCard 0.5s forwards ease;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 0 25px rgba(244, 114, 182, 0.7); /* Hard Pink Glow on Hover */
            background: #ffffff;
        }

        .card h4 {
            margin-bottom: 8px;
            font-size: 19px;
            color: #0f172a; /* Dark Text inside White Box */
            font-weight: 800;
        }

        .card p {
            font-size: 13px;
            color: #475569; /* Dark Soft Slate Description */
            margin-bottom: 18px;
            line-height: 1.5;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .card a {
            display: inline-block;
            background: #020617; /* High contrast Dark Sky Blue Link Button */
            color: #38bdf8;
            border: 1px solid #38bdf8;
            padding: 8px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.3s;
        }

        .card a:hover {
            background: #38bdf8;
            color: #020617;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        /* SUB-PANELS */
        .owner-auth-box {
            background: #0f172a;
            border: 2px dashed #f472b6;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            max-width: 400px;
            animation: slideDown 0.3s ease-out;
        }

        .admin-panel-box {
            background: #020617;
            border: 1px dashed #38bdf8;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            animation: slideDown 0.3s ease-out;
        }

        /* INTRUSION SYSTEM STYLES */
        .intrusion-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(220, 38, 38, 0.25);
            z-index: 99;
            pointer-events: none;
            animation: flashOverlay 0.5s infinite alternate;
            display: none;
        }

        .alert-icon-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 98;
            pointer-events: none;
            display: none;
        }

        .floating-alert-icon {
            position: absolute;
            color: #dc2626;
            font-size: 40px;
            font-weight: bold;
            animation: spinIcon 2s infinite linear;
        }

        .glowing-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #020617;
            border: 3px solid #ff0055;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 30px #ff0055, inset 0 0 15px #ff0055;
            z-index: 100;
            text-align: center;
            display: none;
            width: 90%;
            max-width: 450px;
        }

        .glowing-text {
            color: #ff0055;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 0 0 8px #ff0055;
            margin-bottom: 20px;
            animation: textPulse 1s infinite alternate;
        }

        /* ANIMATIONS */
        @keyframes bootUp {
            from { opacity: 0; transform: scale(0.9); filter: blur(5px); }
            to { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        @keyframes fadeInContainer {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleInCard {
            from { opacity: 0; transform: scale(0.92) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes flashOverlay {
            0% { background: rgba(220, 38, 38, 0.05); }
            100% { background: rgba(220, 38, 38, 0.35); }
        }

        @keyframes textPulse {
            0% { transform: scale(0.98); }
            100% { transform: scale(1.02); }
        }

        @keyframes spinIcon {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<!-- PIN LOCK OVERLAY SCREEN -->
<div id="pinLockScreen">
    <div class="lock-container">
        <h2>SECURITY TERMINAL</h2>
        <div class="lock-subtitle">Access Restricted</div>
        <input type="password" id="pinInput" class="pin-input" placeholder="••••" maxlength="6" autofocus oninput="checkPinCode()">
        <button class="btn" style="background:#0284c7;" onclick="checkPinCode(true)">UNLOCK PLATFORM</button>
    </div>
</div>

<!-- Intrusion Visual Elements -->
<div class="intrusion-overlay" id="intrusionOverlay"></div>
<div class="alert-icon-container" id="alertIconContainer"></div>

<!-- Glowing Alert Box -->
<div class="glowing-popup" id="glowingPopup">
    <div class="glowing-text">ALERT: unauthorized bypass attempt detected</div>
    <button class="btn" style="background: #ff0055;" onclick="closeAlarmSystem()">DISMISS SYSTEM ALERT</button>
</div>

<div class="container hidden" id="mainContainer">
    
    <div id="dashboard">
        <div class="dash-header">
            <h1 class="main-title">CHERRY HACKING UNIVERSE</h1>
            <div class="action-btns">
                <button class="btn admin-btn" id="adminPanelBtn" onclick="toggleOwnerAuthGate()">Owner Panel</button>
            </div>
        </div>

        <!-- NEWLY ADDED OWNER DETAILS COMPONENT -->
        <div class="owner-details-box">
            <div class="owner-title">⚡ SYSTEM DEVELOPER DOSSIER</div>
            <div class="owner-grid">
                <div class="owner-item">🎵 TikTok: <span>@cherry_77055</span></div>
                <div class="owner-item">📸 Instagram: <span>@HAIDER_77055</span></div>
                <div class="owner-item">📧 Gmail: <span>xxcheary@gmail.com</span></div>
            </div>
        </div>

        <!-- SECURE GATEWAY FOR OWNER CREDENTIALS -->
        <div id="ownerAuthGate" class="owner-auth-box hidden">
            <h4 style="color: #f472b6; margin-bottom: 12px; font-size: 14px;">🔒 Verification Required</h4>
            <div class="input-group" style="margin-bottom: 10px;">
                <input type="text" id="gateUser" class="admin-input" placeholder="Owner Username">
            </div>
            <div class="input-group" style="margin-bottom: 12px;">
                <input type="password" id="gatePass" class="admin-input" placeholder="Owner Password">
            </div>
            <button class="btn" style="background: #f472b6; color:#020617; padding: 8px; font-size: 14px;" onclick="verifyOwnerGateCredentials()">Verify & Unlock</button>
        </div>

        <!-- HIDDEN OWNER TOOLS ADDITION BLOCK -->
        <div id="ownerControls" class="admin-panel-box hidden">
            <h3 style="color:#38bdf8; margin-bottom:15px; font-size:15px;">Add New Deployment Tool Link</h3>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <input type="text" id="newToolName" class="admin-input" placeholder="Tool Name" style="flex:1; min-width:150px;">
                <input type="text" id="newToolDesc" class="admin-input" placeholder="Brief Description" style="flex:2; min-width:200px;">
                <input type="text" id="newToolLink" class="admin-input" placeholder="https://..." style="flex:2; min-width:200px;">
                <button class="btn" style="background:#38bdf8; color:#020617; width:auto; padding:0 20px;" onclick="addNewToolItem()">Add Item</button>
            </div>
        </div>

        <div class="section-title">CHERRY HACKER TOOLKIT PANEL</div>
        <div class="grid" id="toolsGrid">
            <!-- Dynamic list elements render here -->
        </div>
    </div>

</div>

<script>
    // System Fixed Master Credentials
    const FIXED_PIN = "804";
    const OWNER_USER = "cherry6163";
    const OWNER_PASS = "@Iqra77055";

    let audioContext = null;
    let alarmInterval = null;

    // Default configuration base deployment links
    const defaultTools = [
        { name: "Cherry SIM Tool", desc: "Access your deployed SIM database management tool platform.", link: "https://cherry-sim.vercel.app/" },
        { name: "Cherry WP Ban Tool", desc: "External web dashboard control panel framework deployment.", link: "https://cherry-whatsappban1.vercel.app/" },
        { name: "Cherry Unban Tool", desc: "Recovery tracking infrastructure interface configuration tool.", link: "https://cheryy-unbantool-l5cm.vercel.app/" },
        { name: "Cherry Code Inspector", desc: "Advanced code inspection and structure analysis platform.", link: "https://cherry-codeinspector.vercel.app" }
    ];

    // Page Load hote hi voice triggering activate hogi
    window.addEventListener('DOMContentLoaded', () => {
        // Trigger voice on first user tap/interaction to prevent browser block policy
        document.body.addEventListener('click', initVoiceCommand, { once: true });
    });

    function initVoiceCommand() {
        try {
            const speech = new SpeechSynthesisUtterance("Enter the password for access");
            speech.lang = 'en-US';
            speech.rate = 0.9.5;
            speech.pitch = 0.8; // Cyber robotic feel voice
            window.speechSynthesis.speak(speech);
        } catch (e) {
            console.log("Voice system speech block exception caught.");
        }
    }

    // PIN validation functionality
    function checkPinCode(forced = false) {
        const inputVal = document.getElementById('pinInput').value;
        
        if (inputVal === FIXED_PIN) {
            // Unlock dashboard
            document.getElementById('pinLockScreen').style.display = "none";
            document.getElementById('mainContainer').classList.remove('hidden');
            renderToolsGrid();
        } else if (forced || inputVal.length >= FIXED_PIN.length) {
            if(inputVal !== FIXED_PIN){
                alert("ACCESS DENIED: Invalid System PIN!");
                document.getElementById('pinInput').value = "";
            }
        }
    }

    function renderToolsGrid() {
        const grid = document.getElementById('toolsGrid');
        grid.innerHTML = "";

        let customTools = JSON.parse(localStorage.getItem('cherry_custom_tools')) || [];
        let totalItems = [...defaultTools, ...customTools];

        totalItems.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.animationDelay = `${index * 0.08}s`;
            card.innerHTML = `
                <h4>${item.name}</h4>
                <p>${item.desc}</p>
                <a href="${item.link}" target="_blank">Launch Tool</a>
            `;
            grid.appendChild(card);
        });
    }

    function toggleOwnerAuthGate() {
        document.getElementById('ownerControls').classList.add('hidden');
        const gate = document.getElementById('ownerAuthGate');
        if(gate.classList.contains('hidden')) {
            gate.classList.remove('hidden');
            document.getElementById('gateUser').value = "";
            document.getElementById('gatePass').value = "";
        } else {
            gate.classList.add('hidden');
        }
    }

    function verifyOwnerGateCredentials() {
        const inputUser = document.getElementById('gateUser').value.trim();
        const inputPass = document.getElementById('gatePass').value.trim();

        if (inputUser === OWNER_USER && inputPass === OWNER_PASS) {
            document.getElementById('ownerAuthGate').classList.add('hidden');
            document.getElementById('ownerControls').classList.remove('hidden');
        } else {
            document.getElementById('ownerAuthGate').classList.add('hidden');
            triggerAlarmSystem();
        }
    }

    function addNewToolItem() {
        const name = document.getElementById('newToolName').value.trim();
        const desc = document.getElementById('newToolDesc').value.trim();
        const link = document.getElementById('newToolLink').value.trim();

        if(!name || !desc || !link) {
            alert("All structural fields are completely mandatory!");
            return;
        }

        let customTools = JSON.parse(localStorage.getItem('cherry_custom_tools')) || [];
        customTools.push({ name, desc, link });
        localStorage.setItem('cherry_custom_tools', JSON.stringify(customTools));

        document.getElementById('newToolName').value = "";
        document.getElementById('newToolDesc').value = "";
        document.getElementById('newToolLink').value = "";

        renderToolsGrid();
    }

    // AUDIO SIREN SYNTHESIZER
    function playSirenSound() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        const osc = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        osc.type = "sawtooth"; 
        osc.connect(gainNode);
        gainNode.connect(audioContext.destination);
        osc.start();
        
        let up = true;
        alarmInterval = setInterval(() => {
            if (up) {
                osc.frequency.setValueAtTime(900, audioContext.currentTime);
                gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
                up = false;
            } else {
                osc.frequency.setValueAtTime(600, audioContext.currentTime);
                gainNode.gain.setValueAtTime(0.05, audioContext.currentTime);
                up = true;
            }
        }, 300);
        window.activeOscillator = osc;
    }

    function triggerAlarmSystem() {
        document.getElementById('glowingPopup').style.display = "block";
        document.getElementById('intrusionOverlay').style.display = "block";
        document.getElementById('alertIconContainer').style.display = "block";
        
        const container = document.getElementById('alertIconContainer');
        container.innerHTML = "";
        for(let i=0; i<15; i++) {
            const icon = document.createElement('div');
            icon.className = 'floating-alert-icon';
            icon.textContent = "⚠️";
            icon.style.left = Math.random() * 90 + "vw";
            icon.style.top = Math.random() * 90 + "vh";
            icon.style.animationDelay = Math.random() * 2 + "s";
            container.appendChild(icon);
        }
        try { playSirenSound(); } catch(e){}
    }

    function closeAlarmSystem() {
        document.getElementById('glowingPopup').style.display = "none";
        document.getElementById('intrusionOverlay').style.display = "none";
        document.getElementById('alertIconContainer').style.display = "none";
        if(alarmInterval) clearInterval(alarmInterval);
        if(window.activeOscillator) {
            try { window.activeOscillator.stop(); } catch(e){}
        }
    }
</script>
</body>
</html>
