<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHERRY HACKER TOOLKIT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #0a0505; /* Super Dark Red/Black */
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
            background-image: radial-gradient(circle at center, #2d0505 0%, #0a0505 100%);
        }

        .container {
            width: 100%;
            max-width: 950px; /* Direct dashboard size */
            background: #180808; /* Dark Cherry Tint */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(220, 38, 38, 0.15);
            border: 1px solid #450a0a;
            position: relative;
            z-index: 10;
            animation: fadeInContainer 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        h2 {
            margin-bottom: 10px;
            color: #ef4444; /* Dark Red Neon */
            font-size: 26px;
            text-align: center;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
            animation: textGlow 2s infinite alternate;
        }

        .input-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
            color: #f87171;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            background: #0a0505;
            border: 1px solid #7f1d1d;
            border-radius: 6px;
            font-size: 15px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #ef4444;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
        }

        .btn {
            width: 100%;
            background: #991b1b;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:hover {
            background: #b91c1c;
            transform: translateY(-1px);
            box-shadow: 0 0 15px rgba(185, 28, 28, 0.5);
        }

        .hidden {
            display: none !important;
        }

        /* Dashboard Styles */
        .dash-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #450a0a;
            padding-bottom: 15px;
            margin-bottom: 25px;
            gap: 10px;
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .admin-btn {
            background: #7c2d12;
            padding: 8px 14px;
            font-size: 14px;
            width: auto;
            border: 1px solid #ea580c;
        }

        .admin-btn:hover {
            background: #9a3412;
            box-shadow: 0 0 15px rgba(234, 88, 12, 0.4);
        }

        .section-title {
            margin: 20px 0 15px 0;
            font-size: 18px;
            color: #ef4444;
            border-left: 4px solid #ef4444;
            padding-left: 8px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(239, 68, 68, 0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: #0a0505;
            border: 1px solid #450a0a;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            animation: scaleInCard 0.5s forwards ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: #ef4444;
            box-shadow: 0 5px 20px rgba(239, 68, 68, 0.25);
        }

        .card h4 {
            margin-bottom: 8px;
            font-size: 18px;
            color: #fecaca;
        }

        .card p {
            font-size: 13px;
            color: #f87171;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .card a {
            display: inline-block;
            background: #ef4444;
            color: #0a0505;
            padding: 8px 16px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .card a:hover {
            background: #f87171;
            box-shadow: 0 0 10px rgba(248, 113, 113, 0.5);
        }

        /* Owner Verification Login Box Inside Dashboard */
        .owner-auth-box {
            background: #270505;
            border: 2px dashed #ef4444;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            max-width: 400px;
            animation: slideDown 0.3s ease-out;
        }

        /* Dynamic Admin Section Controls */
        .admin-panel-box {
            background: #0a0505;
            border: 1px dashed #ef4444;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            animation: slideDown 0.3s ease-out;
        }

        /* INTRUSION SYSTEM STYLES */
        .intrusion-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(220, 38, 38, 0.25);
            z-index: 99;
            pointer-events: none;
            animation: flashOverlay 0.5s infinite alternate;
            display: none;
        }

        .alert-icon-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 98;
            pointer-events: none;
            display: none;
        }

        .floating-alert-icon {
            position: absolute;
            color: #dc2626;
            font-size: 40px;
            font-weight: bold;
            animation: spinIcon 2s infinite linear;
        }

        /* Glowing Custom Popup */
        .glowing-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #0a0505;
            border: 3px solid #dc2626;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 30px #dc2626, inset 0 0 15px #dc2626;
            z-index: 100;
            text-align: center;
            display: none;
            width: 90%;
            max-width: 450px;
        }

        .glowing-text {
            color: #ff0000;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 0 8px #ff0000, 0 0 15px #ff0000;
            margin-bottom: 20px;
            animation: textPulse 1s infinite alternate;
        }

        /* Keyframes Animations */
        @keyframes fadeInContainer {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleInCard {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes textGlow {
            0% { text-shadow: 0 0 10px rgba(239, 68, 68, 0.4); }
            100% { text-shadow: 0 0 20px rgba(239, 68, 68, 0.8); }
        }

        @keyframes flashOverlay {
            0% { background: rgba(220, 38, 38, 0.05); }
            100% { background: rgba(220, 38, 38, 0.4); }
        }

        @keyframes textPulse {
            0% { transform: scale(0.98); opacity: 0.8; }
            100% { transform: scale(1.02); opacity: 1; }
        }

        @keyframes spinIcon {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<!-- Intrusion Visual Elements -->
<div class="intrusion-overlay" id="intrusionOverlay"></div>
<div class="alert-icon-container" id="alertIconContainer"></div>

<!-- Glowing Alert Box -->
<div class="glowing-popup" id="glowingPopup">
    <div class="glowing-text">alert someone trying to enter owner section</div>
    <button class="btn" style="background: #dc2626;" onclick="closeAlarmSystem()">DISMISS SYSTEM ALERT</button>
</div>

<div class="container" id="mainContainer">
    
    <!-- PROTECTED DASHBOARD DIRECT ACCESS -->
    <div id="dashboard">
        <div class="dash-header">
            <h2>CHERRY DARK HACKING UNIVERSE</h2>
            <div class="action-btns">
                <button class="btn admin-btn" id="adminPanelBtn" onclick="toggleOwnerAuthGate()">Owner Panel</button>
            </div>
        </div>

        <!-- SECURE GATEWAY FOR OWNER CREDENTIALS -->
        <div id="ownerAuthGate" class="owner-auth-box hidden">
            <h4 style="color: #ef4444; margin-bottom: 12px; font-size: 15px;">🔒 Verification Required</h4>
            <div class="input-group" style="margin-bottom: 10px;">
                <input type="text" id="gateUser" placeholder="Owner Username" style="padding: 8px 12px; font-size: 14px;">
            </div>
            <div class="input-group" style="margin-bottom: 12px;">
                <input type="password" id="gatePass" placeholder="Owner Password" style="padding: 8px 12px; font-size: 14px;">
            </div>
            <button class="btn" style="background: #b91c1c; padding: 8px; font-size: 14px;" onclick="verifyOwnerGateCredentials()">Verify & Unlock</button>
        </div>

        <!-- HIDDEN OWNER TOOLS ADDITION BLOCK -->
        <div id="ownerControls" class="admin-panel-box hidden">
            <h3 style="color:#ef4444; margin-bottom:15px; font-size:16px;">Add New Deployment Tool Link</h3>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <input type="text" id="newToolName" placeholder="Tool Name" style="flex:1; min-width:150px;">
                <input type="text" id="newToolDesc" placeholder="Brief Description" style="flex:2; min-width:200px;">
                <input type="text" id="newToolLink" placeholder="https://..." style="flex:2; min-width:200px;">
                <button class="btn" style="background:#b91c1c; width:auto; padding:0 20px;" onclick="addNewToolItem()">Add Item</button>
            </div>
        </div>

        <div class="section-title">CHERRY HACKER TOOLKIT PANEL</div>
        <div class="grid" id="toolsGrid">
            <!-- Dynamic and static list elements go here -->
        </div>
    </div>

</div>

<script>
    // Hardcoded master credentials fixed completely
    const OWNER_USER = "cherry6163";
    const OWNER_PASS = "@Iqra77055";

    let audioContext = null;
    let alarmInterval = null;

    // Base default tools configuration array
    const defaultTools = [
        { name: "Cherry SIM Tool", desc: "Access your deployed SIM database management tool platform.", link: "https://cherry-sim.vercel.app/" },
        { name: "Cherry WP Ban Tool", desc: "External web dashboard control panel framework deployment.", link: "https://cherry-whatsappban1.vercel.app/" },
        { name: "Cherry Unban Tool", desc: "Recovery tracking infrastructure interface configuration tool.", link: "https://cheryy-unbantool-l5cm.vercel.app/" },
        { name: "Cherry Code Inspector", desc: "Advanced code inspection and structure analysis platform.", link: "https://cherry-codeinspector.vercel.app" }
    ];

    // Automatically load tools on page open
    window.onload = function() {
        renderToolsGrid();
    };

    function renderToolsGrid() {
        const grid = document.getElementById('toolsGrid');
        grid.innerHTML = "";

        let customTools = JSON.parse(localStorage.getItem('cherry_custom_tools')) || [];
        let totalItems = [...defaultTools, ...customTools];

        totalItems.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            // Staggered animation delay for beautiful loading effect
            card.style.animationDelay = `${index * 0.1}s`;
            card.innerHTML = `
                <h4>${item.name}</h4>
                <p>${item.desc}</p>
                <a href="${item.link}" target="_blank">Launch Tool</a>
            `;
            grid.appendChild(card);
        });
    }

    // Opens or closes the secure gateway prompt panel
    function toggleOwnerAuthGate() {
        document.getElementById('ownerControls').classList.add('hidden');
        
        const gate = document.getElementById('ownerAuthGate');
        if(gate.classList.contains('hidden')) {
            gate.classList.remove('hidden');
            document.getElementById('gateUser').value = "";
            document.getElementById('gatePass').value = "";
        } else {
            gate.classList.add('hidden');
        }
    }

    // Verifies absolute owner credentials inside the dashboard
    function verifyOwnerGateCredentials() {
        const inputUser = document.getElementById('gateUser').value.trim();
        const inputPass = document.getElementById('gatePass').value.trim();

        if (inputUser === OWNER_USER && inputPass === OWNER_PASS) {
            document.getElementById('ownerAuthGate').classList.add('hidden');
            document.getElementById('ownerControls').classList.remove('hidden');
            alert("Access Granted! Owner Section Unlocked.");
        } else {
            document.getElementById('ownerAuthGate').classList.add('hidden');
            triggerAlarmSystem();
        }
    }

    function addNewToolItem() {
        const name = document.getElementById('newToolName').value.trim();
        const desc = document.getElementById('newToolDesc').value.trim();
        const link = document.getElementById('newToolLink').value.trim();

        if(!name || !desc || !link) {
            alert("All dynamic fields are highly mandatory!");
            return;
        }

        let customTools = JSON.parse(localStorage.getItem('cherry_custom_tools')) || [];
        customTools.push({ name, desc, link });
        localStorage.setItem('cherry_custom_tools', JSON.stringify(customTools));

        document.getElementById('newToolName').value = "";
        document.getElementById('newToolDesc').value = "";
        document.getElementById('newToolLink').value = "";

        renderToolsGrid();
        alert("New system module deployed successfully!");
    }

    // WEB AUDIO API - ALARM SIREN SYNTHESIZER
    function playSirenSound() {
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        const osc = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        osc.type = "sawtooth"; 
        osc.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        osc.start();
        
        let up = true;
        alarmInterval = setInterval(() => {
            if (up) {
                osc.frequency.setValueAtTime(850, audioContext.currentTime);
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                up = false;
            } else {
                osc.frequency.setValueAtTime(550, audioContext.currentTime);
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                up = true;
            }
        }, 350);

        window.activeOscillator = osc;
    }

    function triggerAlarmSystem() {
        document.getElementById('glowingPopup').style.display = "block";
        document.getElementById('intrusionOverlay').style.display = "block";
        document.getElementById('alertIconContainer').style.display = "block";
        
        const container = document.getElementById('alertIconContainer');
        container.innerHTML = "";
        for(let i=0; i<15; i++) {
            const icon = document.createElement('div');
            icon.className = 'floating-alert-icon';
            icon.textContent = "⚠️";
            icon.style.left = Math.random() * 90 + "vw";
            icon.style.top = Math.random() * 90 + "vh";
            icon.style.animationDelay = Math.random() * 2 + "s";
            container.appendChild(icon);
        }
        
        try {
            playSirenSound();
        } catch(e) {
            console.log("Audio feedback pending interaction.");
        }
    }

    function closeAlarmSystem() {
        document.getElementById('glowingPopup').style.display = "none";
        document.getElementById('intrusionOverlay').style.display = "none";
        document.getElementById('alertIconContainer').style.display = "none";
        
        if(alarmInterval) clearInterval(alarmInterval);
        if(window.activeOscillator) {
            try {
                window.activeOscillator.stop();
            } catch(e){}
        }
    }
</script>
</body>
</html>
